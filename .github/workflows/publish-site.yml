name: Publish docs site

# Builds the Starlight docs site under site/ and deploys it to GitHub
# Pages.
#
# Setup required, one time, before the first deploy can succeed:
#
#   In repo Settings → Pages → "Build and deployment":
#     - Source: GitHub Actions
#
#   That switch turns on the `github-pages` environment this workflow
#   targets. The first run will fail without it.
#
# The site publishes to https://quartobot.github.io/quartobot/.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "docs-src/**"
      - "justfile"
      - ".github/workflows/publish-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight deploy at a time; queue a follow-up if needed,
# but don't cancel the running one (a half-deployed Pages site is
# worse than a slightly stale one).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up uv (Python + quartobot)
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install quartobot
        run: uv tool install quartobot

      - name: Install jupyter + bash_kernel
        # Quarto runs `{bash}` chunks via Jupyter; bash_kernel is the
        # required IPython kernel for that. Installing globally so
        # Quarto's `python3` lookup finds it without extra env-var wiring.
        run: |
          uv tool install --with bash_kernel jupyter-core
          uv pip install --system jupyter bash_kernel pyyaml
          python3 -m bash_kernel.install

      - name: Render Quarto docs (docs-src/*.qmd → site/src/content/docs/)
        # The dogfood loop: quartobot's docs site is rendered by
        # quartobot's own pre-render hook. docs-src/_quarto.yml runs
        # `quartobot resolve --from-scan .` before Quarto formats the
        # citations into the markdown Astro picks up.
        run: |
          cd docs-src && quarto render
          cd ..
          python3 docs-src/scripts/post-render.py site/src/content/docs/first-manuscript.md

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install Astro dependencies
        run: npm ci
        working-directory: site

      - name: Build
        run: npm run build
        working-directory: site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
