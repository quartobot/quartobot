name: Publish docs site

# Builds the Starlight docs site under site/ and deploys it to GitHub
# Pages.
#
# Setup required, one time, before the first deploy can succeed:
#
#   In repo Settings → Pages → "Build and deployment":
#     - Source: GitHub Actions
#
#   That switch turns on the `github-pages` environment this workflow
#   targets. The first run will fail without it.
#
# The site publishes to https://seandavi.github.io/quartobot/.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/publish-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight deploy at a time; queue a follow-up if needed,
# but don't cancel the running one (a half-deployed Pages site is
# worse than a slightly stale one).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
