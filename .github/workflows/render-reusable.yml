name: Render quartobot manuscript (reusable)

# A single workflow_call entry point that wraps the entire render
# pipeline: setup, banner substitution, render to multiple formats,
# stage outputs, deploy to gh-pages, sticky PR comment.
#
# Consumer workflows shrink to:
#
#   name: Render
#   on:
#     push: { branches: [main] }
#     pull_request: { branches: [main] }
#     workflow_dispatch:
#   jobs:
#     render:
#       uses: seandavi/quartobot/.github/workflows/render-reusable.yml@v0.1
#       permissions:
#         contents: write
#         pull-requests: write
#
# Pin to a tag (`@v0.1`), not `@main`, in production consumers.
# References to `actions/` inside this workflow use `@main` while v0.1
# is unreleased; the tag-release commit will sweep them to `@v0.1`.

on:
  workflow_call:
    inputs:
      formats:
        description: "Comma-separated render formats."
        type: string
        required: false
        default: "html,pdf,docx"
      project-type:
        description: |
          Quarto project type. Affects the staging step:
            - "manuscript" (default): per-format file copy from project
              root (`index.html`, `index.pdf`, `index.docx`, etc.) to
              `public/v/<sha>/`, with a stable `manuscript.<ext>` alias
              for PDF/DOCX.
            - "book": copy the whole `_book/` directory recursively into
              `public/v/<sha>/`. No PDF alias (Quarto book HTML output
              is multi-page; PDF book output isn't staged in v0.1).
        type: string
        required: false
        default: "manuscript"
      manuscript-name:
        description: |
          Base name for the PDF/DOCX copies under `/v/<sha>/` and `/`.
          Default produces `manuscript.pdf` and `manuscript.docx` so the
          stable URL pattern is `…/v/<sha>/manuscript.pdf`. Ignored when
          `project-type: book`.
        type: string
        required: false
        default: "manuscript"
      book-output-dir:
        description: |
          Output directory Quarto books write to. Defaults to `_book/`
          (Quarto's default). Only used when `project-type: book`.
        type: string
        required: false
        default: "_book"
      # NOTE: For project-type "manuscript", the workflow assumes a
      # Quarto-Manuscripts-style project with `index.qmd` at the
      # project root producing `index.html`/`index.pdf`/`index.docx`.
      # For project-type "book", it assumes Quarto's default
      # `_book/` output directory. Consumers with a different layout
      # should use `quartobot detach` (once that lands in #25) to copy
      # the full pipeline locally and edit it.
      python-version:
        description: "Python version for the quartobot install."
        type: string
        required: false
        default: "3.12"
      quartobot-spec:
        description: |
          Pip spec for the quartobot CLI. Defaults to the published git
          ref; pin a tag (`@v0.1.0`), point at a fork, or use a
          workspace path for in-tree testing.
        type: string
        required: false
        default: "git+https://github.com/seandavi/quartobot"
      quarto-version:
        description: |
          Quarto version. `release` (the default) installs the latest
          stable; `pre-release` is also recognized. Pass a specific
          version like "1.5.57" for reproducible CI. Empty string is
          normalized to `release` so it doesn't 404.
        type: string
        required: false
        default: "release"
      tinytex:
        description: "Install TinyTeX (required for PDF render)."
        type: string
        required: false
        default: "true"
      project:
        description: |
          Directory holding `_quarto.yml`. Passed to both composite
          actions so the setup and render run inside the project dir.
          Defaults to the repo root.
        type: string
        required: false
        default: "."
      banner-template:
        description: "Banner template path (sed substitution input)."
        type: string
        required: false
        default: "_version-banner.html.template"
      banner-output:
        description: "Banner output path (sed substitution output)."
        type: string
        required: false
        default: "_version-banner.html"

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Serialize gh-pages writes across concurrent runs of this workflow
    # in any consumer repo using the same job.
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    steps:
      - name: Check out source
        # Fetch tags + history so the snapshot-retention step can read
        # which commits carry tags (those snapshots are kept indefinitely).
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up quartobot toolchain
        uses: seandavi/quartobot/actions/setup-quartobot@main
        with:
          python-version: ${{ inputs.python-version }}
          quartobot-spec: ${{ inputs.quartobot-spec }}
          quarto-version: ${{ inputs.quarto-version }}
          tinytex: ${{ inputs.tinytex }}
          project: ${{ inputs.project }}

      - name: Substitute version banner (push to main only)
        # PR builds keep the committed placeholder; the PR-specific URLs
        # are posted in the sticky PR comment below. Only main builds
        # get the immutable per-commit permalink in HTML.
        #
        # If the caller omits `pdf` from `formats`, `__VERSION_PDF__` is
        # still substituted to a PDF URL — but the banner template
        # itself is in user-owned space (template/_version-banner.html.template
        # in a consumer repo), so HTML-only consumers can simply remove
        # the PDF anchor from their banner template.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          MANUSCRIPT: ${{ inputs.manuscript-name }}
          BANNER_TEMPLATE: ${{ inputs.banner-template }}
          BANNER_OUTPUT: ${{ inputs.banner-output }}
        working-directory: ${{ inputs.project }}
        run: |
          SHORT="${GITHUB_SHA:0:7}"
          BASE="https://${OWNER}.github.io/${REPO_NAME}"
          sed \
            -e "s|__VERSION_SHA__|${SHORT}|g" \
            -e "s|__VERSION_URL__|${BASE}/v/${GITHUB_SHA}/|g" \
            -e "s|__VERSION_PDF__|${BASE}/v/${GITHUB_SHA}/${MANUSCRIPT}.pdf|g" \
            -e "s|__VERSION_LATEST__|${BASE}/|g" \
            -e "s|__VERSION_GH__|https://github.com/${OWNER}/${REPO_NAME}|g" \
            "${BANNER_TEMPLATE}" > "${BANNER_OUTPUT}"
          echo "--- generated ${BANNER_OUTPUT} ---"
          cat "${BANNER_OUTPUT}"

      - name: Render manuscript
        uses: seandavi/quartobot/actions/render-manuscript@main
        with:
          project: ${{ inputs.project }}
          formats: ${{ inputs.formats }}

      # ----------------------------------------------------------------
      # Apply the snapshot retention policy to gh-pages BEFORE the
      # render's deploy step. Pushes a single "prune" commit that
      # replaces aged-out v/<sha>/ directories with redirect stubs;
      # the deploy step then overlays the new render with
      # `keep_files: true`. Net effect per run: gh-pages stays curated
      # and inside the configured size budget.
      #
      # On pull_request, runs in echo-only mode (inventory + policy
      # logged, no mutations) — PR builds shouldn't touch v/.
      # ----------------------------------------------------------------
      - name: Prune old snapshots
        if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'
        uses: seandavi/quartobot/actions/prune-snapshots@main
        with:
          project: ${{ inputs.project }}
          mode: ${{ github.event_name == 'pull_request' && 'echo' || 'apply' }}

      # ----------------------------------------------------------------
      # Stage outputs for deployment.
      #
      # Layout on gh-pages (mirrors the manubot pattern):
      #
      #   /                              latest main build
      #   /v/<commit-sha>/               immutable per-commit snapshot
      #   /pr/<pr-number>/               live preview for an open PR
      #
      # `keep_files: true` on the deploy step preserves prior /v/* and
      # /pr/* directories (less anything the prune step retired in the
      # preceding step). Stale PR previews are cleaned up by a separate
      # pr-closed workflow when a PR closes.
      # ----------------------------------------------------------------
      - name: Stage outputs
        # On `pull_request` events, GITHUB_SHA is the synthetic merge
        # commit. The PR sticky comment links to head.sha (what the
        # author actually pushed), so the staging path uses head.sha on
        # PR events to match.
        env:
          PROJECT_TYPE: ${{ inputs.project-type }}
          OUTPUT: "index"
          MANUSCRIPT: ${{ inputs.manuscript-name }}
          BOOK_OUTPUT_DIR: ${{ inputs.book-output-dir }}
          FORMATS: ${{ inputs.formats }}
          PROJECT: ${{ inputs.project }}
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        working-directory: ${{ inputs.project }}
        run: |
          set -euxo pipefail

          # Format -> file-extension map. Quarto's `--to <name>` writes
          # outputs as `index.<ext>` for these formats. Extend the map
          # if you add a format whose extension differs.
          declare -A EXT=(
            [html]=html
            [pdf]=pdf
            [docx]=docx
            [epub]=epub
            [jats]=xml
            [revealjs]=html
            [gfm]=md
          )

          # Manuscript staging: copy per-format files from project root.
          stage_manuscript() {
            local dest="$1"
            mkdir -p "$dest"
            IFS=',' read -ra REQUESTED <<< "$FORMATS"
            for raw in "${REQUESTED[@]}"; do
              fmt=$(echo "$raw" | xargs)
              [ -z "$fmt" ] && continue
              ext="${EXT[$fmt]:-$fmt}"
              src="${OUTPUT}.${ext}"
              if [ ! -f "$src" ]; then
                echo "::warning::format '$fmt' requested but '$src' not found; skipping"
                continue
              fi
              cp "$src" "$dest/$src"
              # Also publish under the stable manuscript name for
              # everything except HTML (which is served via directory
              # URLs and must keep its source filename for `index.html`).
              if [ "$fmt" != "html" ] && [ "$fmt" != "revealjs" ]; then
                cp "$src" "$dest/${MANUSCRIPT}.${ext}"
              fi
            done
          }

          # Book staging: copy the entire _book/ site recursively. Books
          # produce a multi-page site with search, chapter navigation,
          # and per-chapter HTML, so we lift the whole directory rather
          # than picking individual files.
          stage_book() {
            local dest="$1"
            mkdir -p "$dest"
            if [ ! -d "$BOOK_OUTPUT_DIR" ]; then
              echo "::error::book output directory '$BOOK_OUTPUT_DIR' not found"
              exit 1
            fi
            # `cp -R $src/. $dest/` copies CONTENTS not the directory
            # itself, so the served URL is /v/<sha>/index.html, not
            # /v/<sha>/_book/index.html.
            cp -R "${BOOK_OUTPUT_DIR}/." "$dest/"
          }

          stage_dir() {
            case "$PROJECT_TYPE" in
              manuscript) stage_manuscript "$1" ;;
              book)       stage_book "$1" ;;
              *)
                echo "::error::unknown project-type '$PROJECT_TYPE' (expected 'manuscript' or 'book')"
                exit 1
                ;;
            esac
          }

          # Always stage a per-commit snapshot.
          stage_dir "public/v/${SHA}"

          # On push to main, also publish to the root.
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            stage_dir "public"
          fi

          # On PR, publish a per-PR preview alongside the snapshot.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            stage_dir "public/pr/${PR_NUMBER}"
          fi

          echo "--- staged ---"
          find public -maxdepth 3 -type f | sort | head -50

      - name: Move staged public/ up to repo root for deploy
        # The staging step runs inside `${{ inputs.project }}` so it
        # produces `${{ inputs.project }}/public/...`. Move that to the
        # repo root for the gh-pages action below.
        if: inputs.project != '.'
        run: |
          if [ -d "${{ inputs.project }}/public" ]; then
            mv "${{ inputs.project }}/public" public
          fi

      - name: Deploy to gh-pages
        # Forks can't push to gh-pages with the default GITHUB_TOKEN —
        # skip the deploy on those, but the render itself still
        # validates the build.
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./public
          keep_files: true
          commit_message: |
            Render ${{ github.event_name }} ${{ github.sha }}
            ${{ github.event.head_commit.message || github.event.pull_request.title }}
          user_name: "github-actions[bot]"
          user_email: "41898282+github-actions[bot]@users.noreply.github.com"

      # Build the sticky comment body in a shell step so we can
      # conditionally include the PDF column when callers omit `pdf`
      # from `formats` (HTML-only renders shouldn't advertise PDF links
      # that 404). Books skip the PDF column entirely since the staging
      # step doesn't produce a per-book PDF in v0.1.
      - name: Build sticky comment body
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MANUSCRIPT: ${{ inputs.manuscript-name }}
          FORMATS: ${{ inputs.formats }}
          PROJECT_TYPE: ${{ inputs.project-type }}
        run: |
          BASE="https://${OWNER}.github.io/${REPO_NAME}"
          PR_URL="${BASE}/pr/${PR_NUMBER}/"
          SNAP_URL="${BASE}/v/${HEAD_SHA}/"
          LATEST_URL="${BASE}/"

          include_pdf=false
          if [ "$PROJECT_TYPE" = "manuscript" ] && echo ",${FORMATS}," | grep -q ',pdf,'; then
            include_pdf=true
          fi

          {
            echo "### Rendered preview"
            echo ""
            if $include_pdf; then
              echo "| Version | HTML | PDF |"
              echo "|---|---|---|"
              echo "| This PR (latest) | [\`pr/${PR_NUMBER}/\`](${PR_URL}) | [PDF](${PR_URL}${MANUSCRIPT}.pdf) |"
              echo "| This commit (\`${HEAD_SHA:0:7}\`) | [snapshot](${SNAP_URL}) | [PDF](${SNAP_URL}${MANUSCRIPT}.pdf) |"
              echo "| Latest main | [latest](${LATEST_URL}) | [PDF](${LATEST_URL}${MANUSCRIPT}.pdf) |"
            else
              echo "| Version | Link |"
              echo "|---|---|"
              echo "| This PR (latest) | [\`pr/${PR_NUMBER}/\`](${PR_URL}) |"
              echo "| This commit (\`${HEAD_SHA:0:7}\`) | [snapshot](${SNAP_URL}) |"
              echo "| Latest main | [latest](${LATEST_URL}) |"
            fi
            echo ""
            echo "Snapshots are immutable. Latest links update on every push to \`main\`."
          } > "${RUNNER_TEMP}/pr-comment.md"

      - name: Comment on PR with preview links
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: manuscript-preview
          path: ${{ runner.temp }}/pr-comment.md
