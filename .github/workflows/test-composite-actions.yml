name: Test composite actions

# Sanity-check the composite actions render examples/extension-minimal/
# end-to-end. Catches regressions in setup-quartobot or
# render-manuscript before they ship to consumers.

on:
  push:
    branches: [main]
    paths:
      - "actions/**"
      - "_extensions/**"
      - "examples/extension-minimal/**"
      - ".github/workflows/test-composite-actions.yml"
  pull_request:
    paths:
      - "actions/**"
      - "_extensions/**"
      - "examples/extension-minimal/**"
      - ".github/workflows/test-composite-actions.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  render-example-minimal:
    name: Render examples/extension-minimal via composite actions
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up quartobot toolchain (against in-tree checkout)
        uses: ./actions/setup-quartobot
        with:
          # Install the extension from the local checkout so this test
          # validates THIS commit, not whatever's published upstream.
          extension-source: ${{ github.workspace }}
          project: examples/extension-minimal

      # Patch manubot 0.6.1 for compatibility with pandoc 3.x bundled
      # by recent Quarto releases. Manubot expects a top-level
      # `pandoc version` key in `pandoc --version --version` YAML; pandoc
      # 3.x nests it under `pandoc.version`. Patch handles both shapes.
      # Tracked at https://github.com/seandavi/quartobot/issues/32.
      - name: Patch manubot for pandoc 3.x compatibility
        shell: python
        run: |
          from pathlib import Path
          import manubot.pandoc.util as util
          path = Path(util.__file__)
          src = path.read_text()
          marker = 'if stats["pandoc version"] < (2, 11):'
          replacement = (
              'pv = stats.get("pandoc version") or stats.get("pandoc", {}).get("version") or (0,)\n'
              '    if isinstance(pv, str):\n'
              '        pv = tuple(int(p) for p in pv.split(".") if p.isdigit())\n'
              '    if pv < (2, 11):'
          )
          if marker not in src:
              print("::warning::manubot source no longer matches — patch may be obsolete")
          else:
              path.write_text(src.replace(marker, replacement))
              print(f"Patched {path}")

      - name: Render manuscript
        uses: ./actions/render-manuscript
        with:
          project: examples/extension-minimal
          formats: html,pdf,docx

      - name: Confirm outputs landed
        working-directory: examples/extension-minimal
        run: |
          set -euxo pipefail
          ls -la
          test -f index.html
          test -f index.pdf
          test -f index.docx
          test -f references.json   # manubot's resolver output
          # Smoke check: resolved DOI made it into the bibliography.
          grep -q "10.1371/journal.pcbi.1007128" references.json
