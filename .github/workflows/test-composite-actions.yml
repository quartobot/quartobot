name: Test composite actions

# Sanity-check the composite actions render the example projects
# end-to-end. Catches regressions in setup-quartobot or
# render-manuscript before they ship to consumers. Two matrix entries:
#
#   - manuscript: renders examples/extension-minimal/ to HTML/PDF/DOCX
#   - book: renders examples/book-minimal/ to a Quarto book site
#
# Each entry checks that citations resolved end-to-end against the
# in-tree extension.

on:
  push:
    branches: [main]
    paths:
      - "actions/**"
      - "_extensions/**"
      - "examples/extension-minimal/**"
      - "examples/book-minimal/**"
      - ".github/workflows/test-composite-actions.yml"
  pull_request:
    paths:
      - "actions/**"
      - "_extensions/**"
      - "examples/extension-minimal/**"
      - "examples/book-minimal/**"
      - ".github/workflows/test-composite-actions.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  render-example:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          # Manuscript: HTML + PDF + DOCX, output files at project root.
          - label: manuscript (examples/extension-minimal)
            project: examples/extension-minimal
            formats: html,pdf,docx
            tinytex: "true"
            assert-files: |
              index.html
              index.pdf
              index.docx
              references.json
          # Book: HTML only (no PDF book in v0.1), output under _book/.
          # TinyTeX skipped for a faster CI job since we don't render PDF.
          - label: book (examples/book-minimal)
            project: examples/book-minimal
            formats: html
            tinytex: "false"
            assert-files: |
              _book/index.html
              _book/chapters/intro.html
              _book/chapters/methods.html
              _book/chapters/discussion.html
              _book/search.json
              references.json
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up quartobot toolchain (against in-tree checkout)
        uses: ./actions/setup-quartobot
        with:
          # Install the extension from the local checkout so this test
          # validates THIS commit, not whatever's published upstream.
          extension-source: ${{ github.workspace }}
          project: ${{ matrix.project }}
          tinytex: ${{ matrix.tinytex }}

      - name: Render
        uses: ./actions/render-manuscript
        with:
          project: ${{ matrix.project }}
          formats: ${{ matrix.formats }}

      - name: Confirm outputs landed
        working-directory: ${{ matrix.project }}
        env:
          ASSERT_FILES: ${{ matrix.assert-files }}
        run: |
          set -euxo pipefail
          ls -la
          missing=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if [ ! -f "$f" ]; then
              echo "::error::expected output $f not found"
              missing=$((missing + 1))
            fi
          done <<< "$ASSERT_FILES"
          if [ "$missing" -gt 0 ]; then
            exit 1
          fi
          # Smoke check: the resolved manubot DOI made it into the
          # bibliography for both project types.
          grep -q "10.1371/journal.pcbi.1007128" references.json
