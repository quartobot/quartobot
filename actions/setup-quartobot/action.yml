name: Set up quartobot toolchain
description: |
  Install Python, the `quartobot` CLI on PATH (so Quarto's pre-render
  hook subprocess can invoke it), pandoc, Quarto, and TinyTeX. Use this
  in any workflow that renders a Quarto project using the quartobot
  pre-render hook for citation resolution.

inputs:
  python-version:
    description: "Python version to install."
    required: false
    default: "3.12"
  quartobot-spec:
    description: |
      Pip spec for the `quartobot` CLI. Defaults to the published
      git ref; override with a tag, a fork, or a workspace path for
      testing against a specific build.
    required: false
    default: "git+https://github.com/quartobot/quartobot"
  quarto-version:
    description: |
      Quarto version. `release` is the latest stable; `prerelease` and
      `daily` are also valid. Pass a specific version like "1.5.57" for
      reproducible CI.
    required: false
    default: "release"
  tinytex:
    description: |
      Install TinyTeX. Set to "false" to skip if you only render HTML
      and want a faster CI job.
    required: false
    default: "true"
  project:
    description: |
      Directory holding the `_quarto.yml` that declares the
      `quartobot resolve` pre-render hook. Defaults to the repo root.
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    # Install pandoc as a standalone binary on PATH. Quarto bundles its
    # own pandoc and invokes it internally, but manubot's bibliography
    # loader shells out to `pandoc` via `shutil.which("pandoc")` to
    # convert biblatex (.bib) to CSL JSON. Without a system pandoc,
    # manubot silently returns an empty bibliography and any citation
    # keys defined in `.bib` files are then treated as unresolved
    # manubot identifiers — causing renders to fail.
    - name: Set up pandoc
      uses: r-lib/actions/setup-pandoc@v2

    - name: Install quartobot CLI
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install '${{ inputs.quartobot-spec }}'
        quartobot --version
        quartobot --help | head -5

    - name: Set up Quarto
      uses: quarto-dev/quarto-actions/setup@v2
      with:
        tinytex: ${{ inputs.tinytex }}
        version: ${{ inputs.quarto-version }}
      env:
        # Authenticate the TinyTeX release lookup against the GitHub API
        # so we don't hit unauthenticated rate limits on hot CI hours.
        GITHUB_TOKEN: ${{ github.token }}
