name: Set up quartobot toolchain
description: |
  Install Python, manubot (which provides pandoc-manubot-cite on PATH),
  Quarto with TinyTeX, and the quarto-manubot-cite extension into a
  Quarto project. Use this in any workflow that renders a Quarto project
  using the manubot citation pattern.

inputs:
  python-version:
    description: "Python version to install."
    required: false
    default: "3.12"
  manubot-spec:
    description: |
      Pip spec for manubot. The default range keeps you on a tested 0.6.x;
      override with a pinned version if you need reproducibility against a
      specific Crossref/PubMed schema.
    required: false
    default: "manubot>=0.6,<0.7"
  quarto-version:
    description: |
      Quarto version. Empty means the latest stable release. Pass a
      specific version like "1.5.57" for reproducible CI.
    required: false
    default: ""
  tinytex:
    description: |
      Install TinyTeX. Set to "false" to skip if you only render HTML
      and want a faster CI job.
    required: false
    default: "true"
  extension-source:
    description: |
      Source for `quarto add`. Defaults to the published quartobot repo;
      for testing against an in-tree copy pass `${{ github.workspace }}`.
    required: false
    default: "seandavi/quartobot"
  project:
    description: |
      Directory holding the `_quarto.yml` the extension will be installed
      into. The `quarto add` step runs from here.
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip

    - name: Install manubot (provides pandoc-manubot-cite)
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install '${{ inputs.manubot-spec }}'
        which pandoc-manubot-cite
        pandoc-manubot-cite --help | head -5 || true

    - name: Set up Quarto
      uses: quarto-dev/quarto-actions/setup@v2
      with:
        tinytex: ${{ inputs.tinytex }}
        version: ${{ inputs.quarto-version }}
      env:
        # Authenticate the TinyTeX release lookup against the GitHub API
        # so we don't hit unauthenticated rate limits on hot CI hours.
        GITHUB_TOKEN: ${{ github.token }}

    - name: Install quarto-manubot-cite extension
      shell: bash
      working-directory: ${{ inputs.project }}
      run: |
        quarto add '${{ inputs.extension-source }}' --no-prompt
        quarto list extensions
