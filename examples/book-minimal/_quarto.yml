project:
  type: book
  # Resolves @doi:, @pmid:, @arxiv:, @isbn:, @url:, @wikidata:, @pmcid:,
  # and bare DOIs across all chapters before pandoc runs. Same hook as
  # the manuscript example — the architecture is project-type-agnostic.
  pre-render: quartobot resolve --from-scan . --output references.json --id-mode citation-key

# Book-level metadata. Quarto applies this across all chapters and to the
# generated site navigation, search index, and OpenGraph/Twitter cards.
book:
  title: "quartobot — minimal book example"
  author: "Your Name"
  date: today
  chapters:
    - index.qmd
    - chapters/intro.qmd
    - chapters/methods.qmd
    - chapters/discussion.qmd
  search: true
  page-navigation: true

# Dual bibliography: hand-curated entries in references.bib, auto-resolved
# entries in references.json (written by `quartobot resolve`, gitignored).
bibliography:
  - references.bib
  - references.json
csl: https://raw.githubusercontent.com/citation-style-language/styles/master/nature.csl

format:
  html:
    theme: cosmo
    toc: true
    code-copy: true
