# Smallest possible Quarto project that exercises quarto-manubot-cite.
# No version banner, no CI, no template machinery — drop-in.
#
# Prereqs:
#   quarto add seandavi/quartobot
#   pip install 'manubot>=0.6,<0.7'

filters:
  - quarto-manubot-cite

manubot-output-bibliography: references.json
manubot-bibliography-cache: _freeze/manubot-cache.json
manubot-fail-on-errors: false
manubot-infer-citekey-prefixes: true

bibliography:
  - references.bib
  - references.json

format:
  html:
    toc: true
    embed-resources: true
