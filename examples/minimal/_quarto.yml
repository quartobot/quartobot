# Smallest possible Quarto project that exercises the quartobot
# pre-render hook. No version banner, no CI, no template machinery.
#
# Prereq:
#   uv tool install git+https://github.com/quartobot/quartobot

project:
  pre-render: quartobot resolve --from-scan . --output references.json --id-mode citation-key

bibliography:
  - references.bib
  - references.json

format:
  html:
    toc: true
    embed-resources: true
