project:
  type: book
  # See the manuscript template for what the pre-render hook does.
  # Same behavior — resolves persistent-identifier cite keys before
  # pandoc runs, across every chapter in the book.
  pre-render: quartobot resolve --from-scan . --output references.json --id-mode citation-key

book:
  title: "My quartobot book"
  author: "Your Name"
  date: today
  chapters:
    - index.qmd
    - chapters/intro.qmd
    - chapters/methods.qmd
    - chapters/discussion.qmd
  search: true
  page-navigation: true
  # The `repo-url`/`repo-actions` lines surface "edit this page" and
  # "report an issue" links on every chapter — useful for collaborative
  # books where readers can propose fixes via PR.
  # repo-url: https://github.com/<owner>/<repo>
  # repo-actions: [edit, issue]

# Dual bibliography: hand-curated entries in references.bib, auto-resolved
# entries in references.json (written by the pre-render hook, gitignored).
bibliography:
  - references.bib
  - references.json
csl: https://raw.githubusercontent.com/citation-style-language/styles/master/nature.csl

format:
  html:
    theme: cosmo
    toc: true
    code-copy: true
    # Quarto applies include-before-body to every chapter page in a
    # book. CI replaces the placeholder banner with one carrying the
    # per-commit permalink on push to main.
    include-before-body:
      - _version-banner.html
