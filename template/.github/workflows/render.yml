# Renders the manuscript on every push and PR. Behavior — multi-format
# render, immutable per-commit permalink in HTML, gh-pages deploy, sticky
# PR comment with preview links — lives in the upstream reusable
# workflow. Bug fixes there flow here automatically via the version pin.
#
# To customize the pipeline, override inputs below (`formats`,
# `manuscript-name`, etc.). See:
#   https://github.com/seandavi/quartobot/blob/main/.github/workflows/render-reusable.yml
# for the full list of inputs.
#
# For deeper customization (forking the workflow itself), the
# `quartobot detach` CLI command — tracked at
# https://github.com/seandavi/quartobot/issues/25 — will copy the full
# pipeline out so you can edit it freely. That command isn't shipped
# yet; until then, copy `render-reusable.yml` from the quartobot repo
# into this directory and inline the references to composite actions.

name: Render manuscript

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  render:
    uses: seandavi/quartobot/.github/workflows/render-reusable.yml@main
    permissions:
      contents: write
      pull-requests: write
    # Override defaults here, e.g.:
    #   with:
    #     formats: "html,pdf"
    #     manuscript-name: "my-paper"
    #     quarto-version: "1.5.57"
