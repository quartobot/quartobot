project:
  type: default
  # `type: default` matches the Venice working reference. Quarto's first-party
  # `type: manuscript` is the natural fit here but writes to `_manuscript/`
  # which would need the staging/deploy step in render.yml rewritten. Tracked
  # in https://github.com/quartobot/quartobot/issues/3.

  # Resolves @doi:, @pmid:, @arxiv:, @isbn:, @url:, @wikidata:, @pmcid:,
  # and bare DOIs before pandoc runs. The resolved CSL JSON lands in
  # references.json (gitignored — regenerated each render) and pandoc
  # citeproc reads it alongside hand-curated entries in references.bib.
  pre-render: quartobot resolve --from-scan . --output references.json --id-mode citation-key

# Both files merged at render time. Hand-curated entries live in
# references.bib; auto-resolved entries land in references.json (written
# by the pre-render hook above, ignored by git).
bibliography:
  - references.bib
  - references.json
csl: https://raw.githubusercontent.com/citation-style-language/styles/master/nature.csl

format:
  html:
    include-before-body:
      - _version-banner.html
    toc: true
    toc-depth: 3
    number-sections: true
    theme: cosmo
    embed-resources: true
  pdf:
    documentclass: article
    papersize: letter
    geometry:
      - margin=1in
    toc: false
    number-sections: true
    colorlinks: true
    fig-pos: "H"
    keep-tex: true
  docx:
    toc: false
    number-sections: true

execute:
  echo: false
  warning: false
